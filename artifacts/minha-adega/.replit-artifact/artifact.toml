kind = "web"
previewPath = "/"
title = "Minha Adega"
version = "1.0.0"
id = "artifacts/minha-adega"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24569

[services.development]
run = "pnpm --filter @workspace/minha-adega run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/minha-adega", "run", "build" ]
publicDir = "artifacts/minha-adega/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24569"
BASE_PATH = "/"
